name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Adjust this to "master" if that is your primary branch

# Global environment variables to enforce Node 24 early and remove deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. Upgraded from v4 to v6 to support Node 24 natively
      - name: Checkout Repository
        uses: actions/checkout@v6

      # 2. Upgraded to support the Node 24 runtime environment 
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # 3. Upgraded from v4 to v7 for modernized unzipped compression & Node 24 stability
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: '.' # Change this to your build folder (e.g., './dist', './out', './public') if you compile code

      # 4. Final step to securely trigger the deployment to Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
